name: Deploy to Cloudflare Pages on merge

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types:
      - upload_entry

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event.client_payload.deploy }}
    runs-on: ubuntu-latest
    env:
      PUBLIC_SITE_URL: https://k2ss.info
      CONTENTFUL_SPACE: ${{ secrets.CONTENTFUL_SPACE }}
      CONTENTFUL_ENVIRONMENT: ${{ secrets.CONTENTFUL_ENVIRONMENT }}
      CONTENTFUL_ACCESS_TOKEN: ${{ secrets.CONTENTFUL_ACCESS_TOKEN }}
      CONTENTFUL_PREVIEW_TOKEN: ${{ secrets.CONTENTFUL_PREVIEW_TOKEN }}
      PREVIEW_SECRET: dummy # 開発時しか利用しないので適当な値を設定しておく
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.16"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build --project-name=k2ss-info --branch=main

  notify:
    if: ${{ always() && (needs.build_and_deploy.result == 'success' || needs.build_and_deploy.result == 'failure') }}
    needs:
      - build_and_deploy
    runs-on: ubuntu-latest
    steps:
      - name: Notify to Slack
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "${{ needs.build_and_deploy.result == 'success' && ':white_check_mark: Deploy succeeded' || ':x: Deploy failed' }}"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "${{ needs.build_and_deploy.result == 'success' && ':white_check_mark: *Deploy succeeded*' || ':x: *Deploy failed*' }}"
              - type: section
                fields:
                  - type: mrkdwn
                    text: "*Repository:*\n<${{ github.server_url }}/${{ github.repository }}|${{ github.repository }}>"
              - type: actions
                elements:
                  - type: button
                    text:
                      type: plain_text
                      text: View workflow
                    url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    action_id: view_workflow
